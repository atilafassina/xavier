name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Stage 0: validate the tag matches the shipped VERSION before spending any
  # build minutes on the matrix. Cheap, runs once.
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat xavier/VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Version mismatch: tag says '$TAG_VERSION' but xavier/VERSION says '$FILE_VERSION'"
            exit 1
          fi
          echo "Version validated: $FILE_VERSION"

      # Re-run the vault validators here (they also gate PRs via ci.yml) so a
      # broken template can never ship in a release, even if a tag is pushed
      # from a branch that skipped PR CI.
      - name: validate-skills
        run: bash validate-skills.sh
      - name: validate-xavier-frontmatter
        run: bash validate-xavier-frontmatter.sh
      - name: validate-install-triples
        run: bash validate-install-triples.sh

  # Stage 1: cross-compile xavier-tool --release for every supported target
  # triple, each on an appropriate runner. This is a hand-written matrix (the
  # build environment is offline-by-policy; cargo-dist is intentionally not
  # used). Each leg uploads its single binary as an artifact named for the
  # triple; the assemble job downloads them all into one bin/ tree.
  #
  # The supported set MUST stay in lockstep with:
  #   * xavier/install.sh detect_host_triple()  (install-time selection)
  #   * xavier/deps/multi-model-dispatch/merge.sh resolve_tool()  (runtime)
  #   * validate-install-triples.sh SUPPORTED table  (offline guard)
  # All four agree on: {x86_64,aarch64} x {apple-darwin, unknown-linux-gnu}.
  build:
    needs: validate
    name: build ${{ matrix.triple }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # macOS Apple Silicon — native on the arm64 runner.
          - triple: aarch64-apple-darwin
            runner: macos-latest
          # macOS Intel (x86_64) — cross-compiled on the Apple Silicon runner via
          # rustup's x86_64-apple-darwin target. macOS clang/ld is multi-arch, so
          # no Intel runner is needed; the retired macos-13 image had become a
          # scarce, often-unschedulable bottleneck. CI never executes this binary,
          # so cross-compiling (no emulation) is sufficient.
          - triple: x86_64-apple-darwin
            runner: macos-latest
          # Linux x86_64 — native on ubuntu.
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          # Linux aarch64 — cross-compiled from the x86_64 ubuntu runner using
          # the distro's aarch64 GCC toolchain as the linker. No emulation: we
          # only build (CI never executes the aarch64 binary), so a cross
          # linker is sufficient and avoids QEMU/Docker.
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            linker: gcc-aarch64-linux-gnu
            cargo_linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            cargo_linker_bin: aarch64-linux-gnu-gcc
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain (with target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Install cross linker (Linux aarch64 only)
        if: ${{ matrix.linker != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y "${{ matrix.linker }}"

      - name: Build xavier-tool (release, ${{ matrix.triple }})
        env:
          # Only set for the cross leg; harmless/empty otherwise. Points cargo
          # at the aarch64 cross linker for the aarch64-unknown-linux-gnu target.
          CROSS_LINKER_ENV: ${{ matrix.cargo_linker_env }}
          CROSS_LINKER_BIN: ${{ matrix.cargo_linker_bin }}
        run: |
          if [ -n "$CROSS_LINKER_ENV" ]; then
            export "$CROSS_LINKER_ENV=$CROSS_LINKER_BIN"
            echo "Using cross linker: $CROSS_LINKER_ENV=$CROSS_LINKER_BIN"
          fi
          echo "Building xavier-tool for ${{ matrix.triple }}"
          cargo build --release --target "${{ matrix.triple }}" \
            --manifest-path tool/Cargo.toml --bin xavier-tool

      - name: Stage binary under bin/<triple>/
        run: |
          DEST="xavier/bin/${{ matrix.triple }}"
          mkdir -p "$DEST"
          cp "tool/target/${{ matrix.triple }}/release/xavier-tool" "$DEST/xavier-tool"
          chmod +x "$DEST/xavier-tool"
          echo "Staged: $DEST/xavier-tool"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: xavier-tool-${{ matrix.triple }}
          path: xavier/bin/${{ matrix.triple }}/xavier-tool
          if-no-files-found: error
          retention-days: 1

  # Stage 2: assemble exactly ONE tarball. Download every per-triple artifact
  # back into xavier/bin/<triple>/xavier-tool, then tar the whole xavier/ tree
  # once. This is the single-tarball contract: N build legs, 1 release asset.
  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all per-triple binaries
        uses: actions/download-artifact@v4
        with:
          # Each artifact is named xavier-tool-<triple> and holds a single
          # xavier-tool file. With merge-multiple:false, download-artifact lays
          # each one down under its own xavier/bin/xavier-tool-<triple>/ dir;
          # the next step renames those to the canonical xavier/bin/<triple>/.
          pattern: xavier-tool-*
          path: xavier/bin
          merge-multiple: false

      - name: Normalize bin/ layout and re-mark executable
        run: |
          # download-artifact lays each artifact down as
          #   xavier/bin/xavier-tool-<triple>/xavier-tool
          # Rename each to the canonical xavier/bin/<triple>/xavier-tool so the
          # layout matches install.sh / merge.sh expectations exactly.
          cd xavier/bin
          for dir in xavier-tool-*/; do
            [ -d "$dir" ] || continue
            triple="${dir#xavier-tool-}"
            triple="${triple%/}"
            mkdir -p "$triple"
            mv "$dir/xavier-tool" "$triple/xavier-tool"
            rmdir "$dir"
            chmod +x "$triple/xavier-tool"
            echo "Assembled: bin/$triple/xavier-tool"
          done
          echo "--- final bin/ layout ---"
          find . -type f | sort

      - name: Build the single tarball
        run: tar czf xavier.tar.gz xavier/

      - name: Extract changelog section for this release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract raw section from CHANGELOG.md
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/      { exit }
            capture && /^\[.*\]:/    { exit }
            capture                  { print }
          ' CHANGELOG.md > raw_notes.md

          if [ ! -s raw_notes.md ]; then
            echo "::error::No changelog section found for version $VERSION in CHANGELOG.md"
            exit 1
          fi

          # Strip empty sections (### heading followed by blank lines and another ### or EOF)
          awk '
            /^### / {
              heading = $0
              body = ""
              next
            }
            {
              if (heading != "") {
                if (/^[[:space:]]*$/) { next }
                print heading
                print ""
                heading = ""
              }
              print
            }
          ' raw_notes.md > RELEASE_NOTES.md

          # Append contributor thank-you
          PREV_TAG="$(git tag --sort=-v:refname | grep -E "^v[0-9]" | sed -n '2p' || true)"
          REPO_OWNER="$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)"

          if [ -n "$PREV_TAG" ]; then
            CONTRIBUTORS="$(gh api "/repos/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_REF_NAME}" \
              --jq '[.commits[].author.login // empty] | unique | .[]' 2>/dev/null || true)"
          else
            CONTRIBUTORS="$(gh api "/repos/${GITHUB_REPOSITORY}/commits?sha=${GITHUB_REF_NAME}&per_page=100" \
              --jq '[.[].author.login // empty] | unique | .[]' 2>/dev/null || true)"
          fi

          # Filter out the repo owner
          CONTRIBUTORS="$(echo "$CONTRIBUTORS" | grep -v "^${REPO_OWNER}$" || true)"

          if [ -n "$CONTRIBUTORS" ]; then
            {
              echo ""
              echo "---"
              echo ""
              echo "Thank you to our contributor(s) for this release:"
              echo "$CONTRIBUTORS" | while read -r user; do
                echo "- @${user}"
              done
            } >> RELEASE_NOTES.md
          fi

          echo "--- release notes ---"
          cat RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" xavier.tar.gz --notes-file RELEASE_NOTES.md
