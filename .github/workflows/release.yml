name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat xavier/VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Version mismatch: tag says '$TAG_VERSION' but xavier/VERSION says '$FILE_VERSION'"
            exit 1
          fi
          echo "Version validated: $FILE_VERSION"

      - name: Build tarball
        run: tar czf xavier.tar.gz xavier/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" xavier.tar.gz --generate-notes
